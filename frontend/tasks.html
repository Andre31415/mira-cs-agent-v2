<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRA CS Agent — Task Tracker</title>

</head>
<body data-page="tasks">

    <!-- Sidebar -->

        </div>
        <div class="sidebar-nav">
            <a href="/">

                <span>Email Queue</span>
            </a>
            <a href="/tasks" class="active">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15a2.25 2.25 0 012.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" /></svg>
                <span>Task Tracker</span>
            </a>

                <span>Settings</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h2>Task Tracker</h2>
        </div>

        <!-- Tabs / Filter -->
        <div class="filter-bar">
            <button class="filter-chip active" data-filter-type="type" data-filter-value="" onclick="setFilter('type','',loadTasks)">All Tasks</button>
            <button class="filter-chip" data-filter-type="type" data-filter-value="ring_exchange" onclick="setFilter('type','ring_exchange',loadTasks)">Ring Exchanges</button>
            <button class="filter-chip" data-filter-type="type" data-filter-value="return_refund" onclick="setFilter('type','return_refund',loadTasks)">Returns / Refunds</button>
            <button class="filter-chip" data-filter-type="type" data-filter-value="prescription_followup" onclick="setFilter('type','prescription_followup',loadTasks)">Prescriptions</button>
        </div>

        <!-- Task Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Type</th>
                        <th>Order</th>
                        <th>Status</th>
                        <th>Details</th>
                        <th>Updated</th>
                    </tr>
                </thead>
                <tbody id="task-table-body">
                    <tr><td colspan="6" style="text-align:center;padding:2rem"><div class="spinner"></div></td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
